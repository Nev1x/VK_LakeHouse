# Iceberg-каталог `iceberg`: JDBC-каталог (Postgres) + warehouse в MinIO (native S3) [T3, T4, FR-004]
connector.name=iceberg
iceberg.catalog.type=jdbc

# JDBC-каталог -> PostgreSQL (БД iceberg_catalog). connection-url БЕЗ userinfo (secret-скан).
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/iceberg_catalog
iceberg.jdbc-catalog.connection-user=${ENV:POSTGRES_USER}
iceberg.jdbc-catalog.connection-password=${ENV:POSTGRES_PASSWORD}
iceberg.jdbc-catalog.catalog-name=iceberg
iceberg.jdbc-catalog.default-warehouse-dir=s3://warehouse/

# Native S3 filesystem -> MinIO (legacy hive-s3 свойства НЕ подмешивать) [T3]
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
