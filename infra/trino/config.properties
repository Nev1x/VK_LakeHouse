# Trino coordinator (single-node) — LoftNavigator 001 [T1, FR-001, FR-012, FR-015]
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080
# статические файловые каталоги из /etc/trino/catalog (iceberg.properties)
catalog.management=static

# Память под локальную машину (heap 1792m; per-node + heap-headroom <= heap) [T1, T2, NFR-002]
query.max-memory=1.4GB
query.max-memory-per-node=1.4GB
memory.heap-headroom-per-node=300MB

# Password-аутентификация [T6, FR-015].
# ВАЖНО (эмпирика I-13): Trino отклоняет проверку пароля по НЕзащищённому HTTP независимо от
# allow-insecure-over-http (тот флаг разрешает лишь БЕСПАРОЛЬНЫЙ insecure-доступ). Поэтому пароль
# ходит по HTTPS (:8443, self-signed, единственный публикуемый порт), а внутренний HTTP :8080
# (discovery/health/internal, НЕ публикуется) остаётся для self-call координатора без TLS-боли.
http-server.authentication.type=PASSWORD
http-server.authentication.allow-insecure-over-http=true
web-ui.authentication.type=FORM
# shared-secret обязателен при включённой аутентификации (даже single-node) — из env
internal-communication.shared-secret=${ENV:TRINO_INTERNAL_SECRET}
# HTTPS на публикуемом порту (self-signed keystore генерируется make up, в git не попадает)
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/auth/trino.p12
http-server.https.keystore.key=${ENV:TRINO_KEYSTORE_PASSWORD}
